<footer class="site-footer h-card" data-pf-site-footer>
  <data class="u-url" href="{{ '/support/' | relative_url }}"></data>
  <div class="wrapper pf-footer-wrap">
    <div class="pf-footer-top">
      <a class="pf-footer-brand" href="{{ '/support/' | relative_url }}">
        <img class="pf-footer-logo" src="{{ '/assets/images/icon.svg' | relative_url }}" width="22" height="22" alt="" decoding="async">
        <span class="p-name">{{ site.title | escape }}</span>
      </a>
      <p class="pf-footer-desc">{{ site.description }}</p>
    </div>
    <nav class="pf-footer-legal" aria-label="Legal and permissions">
      <a href="{{ '/support/privacy/' | relative_url }}">Privacy</a>
      <span class="pf-footer-sep" aria-hidden="true">·</span>
      <a href="{{ '/support/permissions/' | relative_url }}">Permissions</a>
      <span class="pf-footer-sep" aria-hidden="true">·</span>
      <a href="{{ '/support/terms/' | relative_url }}">Terms</a>
    </nav>
  </div>
</footer>
